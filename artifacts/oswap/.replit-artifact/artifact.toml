kind = "web"
previewPath = "/"
title = "OSWAP"
version = "1.0.0"
id = "artifacts/oswap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18609

[services.development]
run = "pnpm --filter @workspace/oswap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oswap", "run", "build" ]
publicDir = "artifacts/oswap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18609"
BASE_PATH = "/"
